<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas Nivel Pro - 10s</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        #quiz-container {
            background-color: #ecf0f1;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 400px;
            text-align: center;
            color: #2c3e50;
        }
        .hidden { display: none; }
        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 12px;
            transition: transform 0.1s, background 0.2s;
        }
        .option-btn:active { transform: scale(0.95); }
        .option-btn:hover { background-color: #d35400; }
        
        #timer-bar-container {
            width: 100%;
            height: 10px;
            background-color: #bdc3c7;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background-color: #e74c3c;
            transition: width 1s linear;
        }
        #question { font-size: 48px; margin: 20px 0; color: #2980b9; }
        #start-btn {
            padding: 20px 40px;
            font-size: 24px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }
        .stats { font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-screen">
        <h1>Nivel DIFÍCIL</h1>
        <p>Tablas: 2, 3, 4, 5 y 10</p>
        <p>⚠️ Solo 10 segundos por pregunta</p>
        <p>🚫 No hay multiplicaciones por 1</p>
        <button id="start-btn">¡ESTOY LISTO!</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="progress">Pregunta <span id="current-num">1</span> de 15</div>
        <div id="timer-bar-container"><div id="timer-bar"></div></div>
        <div id="question">? x ?</div>
        <div id="options">
            <button class="option-btn" onclick="checkAnswer(this)"></button>
            <button class="option-btn" onclick="checkAnswer(this)"></button>
            <button class="option-btn" onclick="checkAnswer(this)"></button>
            <button class="option-btn" onclick="checkAnswer(this)"></button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h1>Puntaje Final</h1>
        <h2 id="final-percent" style="font-size: 50px;">0%</h2>
        <div class="stats">
            <p>✅ Correctas: <span id="res-correct">0</span></p>
            <p>❌ Incorrectas: <span id="res-wrong">0</span></p>
            <p>⚪ Omitidas: <span id="res-skipped">0</span></p>
        </div>
        <button class="option-btn" style="background:#2980b9" onclick="location.reload()">Reintentar</button>
    </div>
</div>

<script>
    const tables = [2, 3, 4, 5, 10];
    let questions = [];
    let currentIdx = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let skippedCount = 0;
    let timeLeft = 10;
    let timerInterval;

    document.getElementById('start-btn').addEventListener('click', startGame);

    function startGame() {
        generateQuestions();
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        showQuestion();
    }

    function generateQuestions() {
        for (let i = 0; i < 15; i++) {
            const t = tables[Math.floor(Math.random() * tables.length)];
            const n = Math.floor(Math.random() * 11) + 2; // Del 2 al 12
            questions.push({ a: t, b: n, ans: t * n });
        }
    }

    function generateDistractors(correct) {
        let distractors = new Set();
        
        // 1. El "Espejo" (invertir dígitos si es > 10 y no termina en 0, o algo similar)
        let sAns = correct.toString();
        if (sAns.length > 1) {
            let rev = parseInt(sAns.split('').reverse().join(''));
            if (rev !== correct) distractors.add(rev);
        }

        // 2. El "Vecino" (+1 o -1)
        distractors.add(correct + 1);
        distractors.add(correct - 1);

        // 3. El "Error de tabla" (+ tabla o - tabla)
        let randomTable = tables[Math.floor(Math.random() * tables.length)];
        distractors.add(correct + randomTable);
        distractors.add(Math.abs(correct - randomTable));

        // Rellenar con aleatorios si falta espacio
        while (distractors.size < 3) {
            distractors.add(correct + Math.floor(Math.random() * 10) + 2);
        }

        let finalOptions = Array.from(distractors).slice(0, 3);
        finalOptions.push(correct);
        return finalOptions.sort(() => Math.random() - 0.5);
    }

    function showQuestion() {
        if (currentIdx >= 15) return endGame();
        
        timeLeft = 10;
        updateTimerBar();
        document.getElementById('current-num').innerText = currentIdx + 1;
        
        const q = questions[currentIdx];
        document.getElementById('question').innerText = `${q.a} × ${q.b}`;
        
        const choices = generateDistractors(q.ans);
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach((btn, i) => {
            btn.innerText = choices[i];
        });

        startTimer();
    }

    function updateTimerBar() {
        const bar = document.getElementById('timer-bar');
        bar.style.transition = 'none';
        bar.style.width = '100%';
        setTimeout(() => {
            bar.style.transition = 'width 10s linear';
            bar.style.width = '0%';
        }, 50);
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                skippedCount++;
                nextQuestion();
            }
        }, 1000);
    }

    function checkAnswer(btn) {
        clearInterval(timerInterval);
        const selected = parseInt(btn.innerText);
        if (selected === questions[currentIdx].ans) {
            correctCount++;
        } else {
            wrongCount++;
        }
        nextQuestion();
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < 15) {
            showQuestion();
        } else {
            endGame();
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        const percent = Math.round((correctCount / 15) * 100);
        document.getElementById('final-percent').innerText = `${percent}%`;
        document.getElementById('res-correct').innerText = correctCount;
        document.getElementById('res-wrong').innerText = wrongCount;
        document.getElementById('res-skipped').innerText = skippedCount;
    }
</script>
</body>
</html>
