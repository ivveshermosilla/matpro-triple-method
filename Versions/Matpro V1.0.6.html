<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas Pro - Con Revisión de Errores</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }
        #quiz-container {
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 95%;
            max-width: 500px;
            text-align: center;
            color: #2c3e50;
        }
        .hidden { display: none; }
        .option-btn {
            display: block; width: 100%; padding: 15px; margin: 8px 0;
            font-size: 22px; font-weight: bold; cursor: pointer;
            background-color: #e67e22; color: white; border: none;
            border-radius: 12px; transition: all 0.2s;
        }
        #timer-bar-container {
            width: 100%; height: 12px; background-color: #bdc3c7;
            border-radius: 6px; margin-bottom: 15px; overflow: hidden;
        }
        #timer-bar { width: 100%; height: 100%; background-color: #e74c3c; }
        #question { font-size: 56px; margin: 10px 0; color: #2980b9; font-weight: 900; }
        .grade-box { font-size: 60px; font-weight: 900; margin: 5px 0; }
        .stats { font-size: 16px; background: #dfe6e9; padding: 12px; border-radius: 15px; margin-bottom: 10px; }
        
        /* Tabla de Récords */
        .records-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        .records-table th { background: #34495e; color: white; padding: 8px; }
        .records-table tr { cursor: pointer; transition: background 0.2s; }
        .records-table tr:hover { background: #dcdde1; }
        .records-table td { padding: 8px; border-bottom: 1px solid #bdc3c7; }
        .current-record { background-color: #f1c40f !important; font-weight: bold; }

        /* Panel de Revisión */
        #review-panel {
            text-align: left; background: white; padding: 15px; border-radius: 15px;
            max-height: 300px; overflow-y: auto; margin-top: 15px; border: 1px solid #bdc3c7;
        }
        .review-item { padding: 5px; border-bottom: 1px solid #eee; font-size: 14px; }
        .rev-correct { color: #27ae60; }
        .rev-wrong { color: #e74c3c; }
        .rev-skipped { color: #7f8c8d; }

        #start-btn, #retry-btn, .action-btn {
            padding: 15px 30px; font-size: 18px; background-color: #27ae60;
            color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-screen">
        <h1>Tablas con Revisión</h1>
        <p>Toca un récord para ver errores pasados</p>
        <button id="start-btn">¡EMPEZAR JUEGO!</button>
        <div style="margin-top:20px;">
            <h3>🏆 Top 10 Récords</h3>
            <table class="records-table" id="records-list-start"></table>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="progress">Pregunta <span id="current-num">1</span> / 20</div>
        <div id="timer-bar-container"><div id="timer-bar"></div></div>
        <div id="question">? × ?</div>
        <div id="options">
            <button class="option-btn" onclick="handleSelect(this)"></button>
            <button class="option-btn" onclick="handleSelect(this)"></button>
            <button class="option-btn" onclick="handleSelect(this)"></button>
            <button class="option-btn" onclick="handleSelect(this)"></button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="result-title">Partida Finalizada</h2>
        <div id="achievement" style="font-size:50px;"></div>
        <div id="grade" class="grade-box">1.0</div>
        <div class="stats">
            <p>⏱️ Tiempo: <span id="res-time">0</span>s | Nota Chile (60%)</p>
            <p>✅ <span id="res-correct">0</span> | ❌ <span id="res-wrong">0</span> | ⚪ <span id="res-skipped">0</span></p>
        </div>

        <button class="action-btn" style="background:#2980b9" onclick="toggleReview()">Ver/Ocultar Errores</button>
        <div id="review-panel" class="hidden"></div>
        
        <br><br>
        <h3>🏆 Mejores Puntajes</h3>
        <table class="records-table" id="records-list-end"></table>
        <br>
        <button id="retry-btn" onclick="location.reload()">NUEVA PARTIDA</button>
    </div>
</div>

<script>
    const totalQ = 20;
    let pool = [], currentIdx = 0, score = { c:0, w:0, s:0 }, history = [];
    let timer, startTime;

    window.onload = () => updateTable('records-list-start');
    document.getElementById('start-btn').addEventListener('click', start);

    function start() {
        startTime = Date.now();
        genPool();
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        showQ();
    }

    function genPool() {
        let p10 = [], pRest = [];
        [2,3,4,5,10].forEach(t => {
            for(let n=2; n<=12; n++) {
                let obj = { a:t, b:n, ans:t*n };
                t === 10 ? p10.push(obj) : pRest.push(obj);
            }
        });
        p10.sort(()=>Math.random()-0.5); pRest.sort(()=>Math.random()-0.5);
        pool = [...p10.slice(0,5), ...pRest.slice(0,15)].sort(()=>Math.random()-0.5);
    }

    function showQ() {
        if(currentIdx >= totalQ) return end();
        document.getElementById('current-num').innerText = currentIdx+1;
        const q = pool[currentIdx];
        document.getElementById('question').innerText = `${q.a} × ${q.b}`;
        
        let d = new Set([q.ans+1, q.ans-1, q.ans+2, Math.abs(q.ans-10)]);
        let s = q.ans.toString(); if(s.length>1) d.add(parseInt(s.split('').reverse().join('')));
        let opts = Array.from(d).filter(x=>x!==q.ans).slice(0,3);
        opts.push(q.ans); opts.sort(()=>Math.random()-0.5);

        document.querySelectorAll('.option-btn').forEach((b,i)=> b.innerText = opts[i]);
        startBar();
    }

    function startBar() {
        const bar = document.getElementById('timer-bar');
        bar.style.transition = 'none'; bar.style.width = '100%';
        setTimeout(()=> { bar.style.transition='width 10s linear'; bar.style.width='0%'; }, 30);
        clearInterval(timer);
        let left = 10;
        timer = setInterval(()=> {
            left--;
            if(left<=0) { clearInterval(timer); recordAns(null); }
        }, 1000);
    }

    function handleSelect(btn) {
        clearInterval(timer);
        recordAns(parseInt(btn.innerText));
    }

    function recordAns(val) {
        const q = pool[currentIdx];
        let status = "skipped";
        if(val !== null) {
            status = (val === q.ans) ? "correct" : "wrong";
            status === "correct" ? score.c++ : score.w++;
        } else { score.s++; }
        
        history.push({ q: `${q.a}×${q.b}`, correct: q.ans, user: val, status: status });
        currentIdx++;
        showQ();
    }

    function end() {
        const time = ((Date.now() - startTime)/1000).toFixed(2);
        const grade = calcGrade(score.c);
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        document.getElementById('grade').innerText = grade;
        document.getElementById('grade').style.color = grade >= 4 ? "#2980b9" : "#e74c3c";
        document.getElementById('achievement').innerText = grade == 7.0 ? "🏆" : (grade >= 4 ? "⭐" : "📚");
        document.getElementById('res-time').innerText = time;
        document.getElementById('res-correct').innerText = score.c;
        document.getElementById('res-wrong').innerText = score.w;
        document.getElementById('res-skipped').innerText = score.s;

        buildReview(history);
        save(grade, time, history);
    }

    function calcGrade(p) {
        let g = (p < 12) ? 1 + (3*(p/12)) : 4 + (3*((p-12)/8));
        return g.toFixed(1);
    }

    function buildReview(data) {
        const panel = document.getElementById('review-panel');
        panel.innerHTML = data.map((x,i)=> `
            <div class="review-item rev-${x.status}">
                <b>${i+1}. ${x.q}</b> | Correcta: ${x.correct} | 
                Tu respuesta: ${x.user === null ? 'Omitida' : x.user}
            </div>
        `).join('');
    }

    function toggleReview() {
        document.getElementById('review-panel').classList.toggle('hidden');
    }

    function save(g, t, h) {
        let recs = JSON.parse(localStorage.getItem('tablas_v4') || '[]');
        const entry = { grade:parseFloat(g), time:parseFloat(t), date:new Date().toLocaleDateString(), history:h };
        recs.push(entry);
        recs.sort((a,b)=> b.grade - a.grade || a.time - b.time);
        localStorage.setItem('tablas_v4', JSON.stringify(recs.slice(0,10)));
        updateTable('records-list-end', entry);
    }

    function updateTable(id, curr=null) {
        const recs = JSON.parse(localStorage.getItem('tablas_v4') || '[]');
        const t = document.getElementById(id);
        t.innerHTML = `<tr><th>#</th><th>Nota</th><th>Tiempo</th><th>Fecha</th></tr>`;
        recs.forEach((r,i)=> {
            const isC = curr && r.grade==curr.grade && r.time==curr.time;
            const row = document.createElement('tr');
            if(isC) row.className = 'current-record';
            row.onclick = () => { buildReview(r.history); document.getElementById('review-panel').classList.remove('hidden'); window.scrollTo(0, document.body.scrollHeight); };
            row.innerHTML = `<td>${i+1}</td><td style="color:${r.grade>=4?'#2980b9':'#e74c3c'}">${r.grade.toFixed(1)}</td><td>${r.time}s</td><td>${r.date}</td>`;
            t.appendChild(row);
        });
    }
</script>
</body>
</html>
