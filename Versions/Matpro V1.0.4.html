<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas Pro - Desafío Cronometrado</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        #quiz-container {
            background-color: #ecf0f1;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 95%;
            max-width: 450px;
            text-align: center;
            color: #2c3e50;
        }
        .hidden { display: none; }
        .option-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 15px;
            transition: all 0.2s;
        }
        .option-btn:active { transform: scale(0.96); }
        #timer-bar-container {
            width: 100%;
            height: 14px;
            background-color: #bdc3c7;
            border-radius: 7px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background-color: #e74c3c;
        }
        #question { font-size: 64px; margin: 15px 0; color: #2980b9; font-weight: 900; }
        #start-btn, #retry-btn {
            padding: 20px 45px;
            font-size: 24px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-weight: bold;
        }
        .grade-box { font-size: 70px; font-weight: 900; margin: 5px 0; }
        .achievement-icon { font-size: 90px; margin: 10px 0; }
        .stats { font-size: 19px; line-height: 1.7; background: #dfe6e9; padding: 20px; border-radius: 15px; }
        .time-label { color: #8e44ad; font-weight: bold; font-size: 22px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-screen">
        <h1>Desafío Extremo</h1>
        <p>20 Preguntas Únicas</p>
        <p>⚡ 10 seg por pregunta</p>
        <p>🕒 Se medirá tu tiempo total</p>
        <button id="start-btn">¡COMENZAR!</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="progress" style="font-weight: bold; color: #7f8c8d;">Pregunta <span id="current-num">1</span> de 20</div>
        <div id="timer-bar-container"><div id="timer-bar"></div></div>
        <div id="question">? × ?</div>
        <div id="options">
            <button class="option-btn" onclick="checkAnswer(this)"></button>
            <button class="option-btn" onclick="checkAnswer(this)"></button>
            <button class="option-btn" onclick="checkAnswer(this)"></button>
            <button class="option-btn" onclick="checkAnswer(this)"></button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h1>Resultado Final</h1>
        <div id="achievement" class="achievement-icon"></div>
        <div id="grade" class="grade-box">1.0</div>
        <div class="stats">
            <p class="time-label">⏱️ Tiempo total: <span id="res-time">0</span>s</p>
            <p>✅ Correctas: <span id="res-correct">0</span> / 20</p>
            <p>❌ Incorrectas: <span id="res-wrong">0</span></p>
            <p>⚪ Omitidas: <span id="res-skipped">0</span></p>
        </div>
        <br>
        <button id="retry-btn" onclick="location.reload()">VOLVER A JUGAR</button>
    </div>
</div>

<script>
    const totalRequired = 20;
    let questionsPool = [];
    let currentIdx = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let skippedCount = 0;
    let timerInterval;
    let gameStartTime;

    document.getElementById('start-btn').addEventListener('click', startGame);

    function startGame() {
        gameStartTime = Date.now();
        generateUniqueQuestions();
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        showQuestion();
    }

    function generateUniqueQuestions() {
        let pool10 = [];
        let poolOthers = [];

        // Crear todas las combinaciones posibles (Tablas 2, 3, 4, 5 y 10)
        const tables = [2, 3, 4, 5, 10];
        for (let t of tables) {
            for (let n = 2; n <= 12; n++) {
                if (t === 10) {
                    pool10.push({ a: t, b: n, ans: t * n });
                } else {
                    poolOthers.push({ a: t, b: n, ans: t * n });
                }
            }
        }

        // Barajar ambos pozos
        pool10.sort(() => Math.random() - 0.5);
        poolOthers.sort(() => Math.random() - 0.5);

        // Seleccionar 5 de la tabla del 10 y 15 de las otras
        questionsPool = [...pool10.slice(0, 5), ...poolOthers.slice(0, 15)];
        
        // Barajar el resultado final de 20 preguntas
        questionsPool.sort(() => Math.random() - 0.5);
    }

    function generateDistractors(correct) {
        let distractors = new Set();
        let sAns = correct.toString();
        
        // Espejo (ej. 24 -> 42)
        if (sAns.length > 1) {
            let rev = parseInt(sAns.split('').reverse().join(''));
            if (rev !== correct) distractors.add(rev);
        }
        distractors.add(correct + 1);
        distractors.add(correct - 1);
        distractors.add(correct + 2);
        distractors.add(Math.abs(correct - 10));

        let finalOptions = Array.from(distractors).filter(d => d !== correct).slice(0, 3);
        finalOptions.push(correct);
        return finalOptions.sort(() => Math.random() - 0.5);
    }

    function showQuestion() {
        if (currentIdx >= totalRequired) return endGame();
        
        document.getElementById('current-num').innerText = currentIdx + 1;
        const q = questionsPool[currentIdx];
        document.getElementById('question').innerText = `${q.a} × ${q.b}`;
        
        const choices = generateDistractors(q.ans);
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach((btn, i) => {
            btn.innerText = choices[i];
        });

        resetAndStartBar();
    }

    function resetAndStartBar() {
        const bar = document.getElementById('timer-bar');
        bar.style.transition = 'none';
        bar.style.width = '100%';
        
        setTimeout(() => {
            bar.style.transition = 'width 10s linear';
            bar.style.width = '0%';
        }, 30);

        clearInterval(timerInterval);
        let timeLeft = 10;
        timerInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                skippedCount++;
                nextQuestion();
            }
        }, 1000);
    }

    function checkAnswer(btn) {
        clearInterval(timerInterval);
        if (parseInt(btn.innerText) === questionsPool[currentIdx].ans) {
            correctCount++;
        } else {
            wrongCount++;
        }
        nextQuestion();
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < totalRequired) {
            showQuestion();
        } else {
            endGame();
        }
    }

    function calculateGrade(points) {
        const max = totalRequired;
        const cutoff = 0.6; // 60% exigencia
        let grade = (points < max * cutoff) 
            ? 1.0 + (3.0 * (points / (max * cutoff)))
            : 4.0 + (3.0 * ((points - (max * cutoff)) / (max * (1 - cutoff))));
        return grade.toFixed(1);
    }

    function endGame() {
        clearInterval(timerInterval);
        const gameEndTime = Date.now();
        const totalSeconds = Math.floor((gameEndTime - gameStartTime) / 1000);

        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        const grade = calculateGrade(correctCount);
        const gradeEl = document.getElementById('grade');
        gradeEl.innerText = grade;
        gradeEl.style.color = (parseFloat(grade) >= 4.0) ? "#2980b9" : "#e74c3c";

        const ach = document.getElementById('achievement');
        if (parseFloat(grade) === 7.0) ach.innerText = "🏆";
        else if (parseFloat(grade) >= 4.0) ach.innerText = "⭐";
        else ach.innerText = "📚";

        document.getElementById('res-time').innerText = totalSeconds;
        document.getElementById('res-correct').innerText = correctCount;
        document.getElementById('res-wrong').innerText = wrongCount;
        document.getElementById('res-skipped').innerText = skippedCount;
    }
</script>
</body>
</html>
